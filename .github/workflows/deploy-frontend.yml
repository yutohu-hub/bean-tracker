name: フロント公開 (GitHub Pages)

# frontend/ を静的エクスポートして GitHub Pages に自動デプロイする。
# main への push（frontend 配下の変更）と、手動実行に対応。

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# Pages デプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1本に（進行中はキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Pages を自動で有効化し、配信先の base_path（例: /bean-tracker）を取得
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 依存インストール
        run: npm ci

      - name: 静的ビルド（out/ を生成）
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Jekyll 無効化（_next を配信させる）
        run: touch out/.nojekyll

      - name: 成果物アップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
