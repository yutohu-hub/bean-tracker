name: Bean Tracker 巡回

on:
  schedule:
    - cron: "0 */6 * * *"   # 6時間ごと（UTC）
  workflow_dispatch:         # 手動実行ボタン

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: 巡回と差分検知
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: 結果をコミット
        run: |
          git config user.name "bean-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップ"
            exit 0
          fi
          git commit -m "crawl: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # 巡回中にブランチが更新されると push が rejected される。
          # 生成物(data/・docs/)は再生成できるので衝突は自分側(-X ours)を採用してリトライ。
          for i in 1 2 3 4 5; do
            if git push; then
              echo "push 成功"
              exit 0
            fi
            echo "push が rejected。rebase して再試行 ($i/5)"
            git pull --rebase --autostash -X ours origin "${GITHUB_REF_NAME}" || git rebase --abort || true
            sleep 3
          done
          echo "リトライ上限。push に失敗しました" >&2
          exit 1
